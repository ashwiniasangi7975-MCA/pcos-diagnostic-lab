<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraHealth Portal - Secure Access Terminal</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .login-wrapper { min-height: 80vh; display: flex; align-items: center; justify-content: center; }
        .login-card { max-w: 400px; width: 100%; margin: 0 auto; }
        .login-header { text-align: center; margin-bottom: 24px; }
        .error-banner { background: #fef2f2; color: #991b1b; border: 1px solid #fee2e2; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; font-weight: 500; text-align: center; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">
            <div style="background-color: #0d9488; color: #ffffff; width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold;">⚕️</div>
            Aura<span>Health</span> Portal
        </div>
    </nav>

    <div class="main-container login-wrapper">
        <div class="card login-card">
            <div class="login-header">
                <h2 style="margin: 0 0 8px 0; color: #0f172a;">Secure Clinician Access</h2>
                <p style="margin: 0; color: #64748b; font-size: 14px;">Enter administrative system variables to authorize workspace node.</p>
            </div>

            <form id="loginForm" action="/login" method="POST" onsubmit="return handleLogin(event)">
                <div id="errorBox" class="error-banner hidden">Invalid authorization profile keys. Check entry credentials.</div>
                
                <div class="form-group" style="margin-bottom: 16px;">
                    <label>System Username</label>
                    <input type="text" id="username" required placeholder="admin" style="box-sizing: border-box; width: 100%;">
                </div>
                
                <div class="form-group" style="margin-bottom: 24px;">
                    <label>Terminal Password</label>
                    <input type="password" id="password" required placeholder="••••••••" style="box-sizing: border-box; width: 100%;">
                </div>

                <button type="submit" class="btn btn-block">Authenticate Session &rarr;</button>
            </form>
        </div>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            // Standard baseline credentials validation mapping
            if (u === 'admin' && p === 'admin123') {
                window.location.href = '/home';
            } else {
                document.getElementById('errorBox').classList.remove('hidden');
            }
            return false;
        }
    </script>
</body>
</html>
